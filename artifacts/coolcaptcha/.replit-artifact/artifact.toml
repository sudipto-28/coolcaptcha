kind = "web"
previewPath = "/"
title = "CoolCaptcha"
version = "1.0.0"
id = "artifacts/coolcaptcha"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25099

[services.development]
run = "pnpm --filter @workspace/coolcaptcha run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coolcaptcha", "run", "build" ]
publicDir = "artifacts/coolcaptcha/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25099"
BASE_PATH = "/"
